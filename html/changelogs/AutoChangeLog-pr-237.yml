author: "Nokia2Student"
delete-after: True
changes:
  - balance: "Изменена механика ментальных дисциплин, большинство из них более не станит, а лишь обездвиживает, тем самым у жертвы есть хоть и маленькая но возможность сопротивления."
  - balance: "Ментальные дисциплины что заставляли ударить себя действуют в 2 раза короче. Т.е. вместо условных 20 ударов, вы нанесете по себе лишь 10, с тем же промежутком."
  - bugfix: "Пофикшены рантаймы с marks, яростью гару, пофикшены различные баги."
  - rscadd: "При активированной 1 и выше точке стремительности, есть шанс полностью избежать вражеского прыжка."
  - rscadd: "При активированной 3 и выше точке стремительности, есть шанс полностью избежать толчка вражеской селерити. Т.е. если в вас на скорости влетят, вы сможете увернуться."
  - balance: "Селерити и черный ветер теперь позволяют быстрее нанести удары, как темпорис что их и так уже ускорял."
  - balance: "Стан от слома наручников при активированной 5 точке потенца увеличен."
  - balance: "Сложность на попадание в голову была увеличена до трех."
  - balance: "Потенц 5 и высокие кубы больше не откидывают целей."
  - balance: "Занерфлена 4 точка флеш шинтай."
  - balance: "Протеан 2 потерял прибавку к урону от кулаков."
  - balance: "Не-гангрелы могут взять лишь слабые формы при использовании 4 протеана."
  - balance: "Уменьшено сопротивление бруту у всех форм. Уменьшено/увеличено хп всех форм до 200. Уменьшен урон большинства форм."
  - balance: "Невидимость ямы 3 точки протеана скейлится с уровнем дисциплины."
  - rscadd: "3 точка темпориса была переработана."
  - rscadd: "Истинная Стремительность, что могут изучить трухи. Аналогична механически обычной."
  - balance: "Кол-во автоуспехов было снижено до 1."
  - bugfix: "Гару снова могут убивать мистер догов."
  - balance: "Уменьшен урон бензопилы. Уменьшен статы огненной и кровавой катаны, по типу урона, блока."